  build-linux-mips64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm
          sudo apt-get install -y libc6-mips64-cross libc6-dev-mips64-cross 2>/dev/null || true
      - run: ./scripts/vendor.sh
      - run: make sqlite-vec.h
      - run: |
          mkdir -p dist/.objs
          SYSROOT=/usr/mips64-linux-gnuabi64
          if [ -d "$SYSROOT/include" ]; then
            echo "Using sysroot: $SYSROOT"
            clang --target=mips64-linux-gnuabi64 --sysroot=$SYSROOT \
              -fuse-ld=lld -nostdlib \
              -Wl,--unresolved-symbols=ignore-all \
              -fPIC -shared -Wall -Wextra -Ivendor/ -O3 \
              sqlite-vec.c -o dist/vec0.so
            clang --target=mips64-linux-gnuabi64 --sysroot=$SYSROOT \
              -Ivendor/ -DSQLITE_CORE -DSQLITE_VEC_STATIC -O3 \
              -c sqlite-vec.c -o dist/.objs/vec.o
          else
            echo "No sysroot, building with freestanding fallback"
            clang --target=mips64-linux-gnuabi64 -fuse-ld=lld -nostdlib \
              -Wl,--unresolved-symbols=ignore-all \
              -fPIC -shared -Wall -Wextra -Ivendor/ -O3 \
              sqlite-vec.c -o dist/vec0.so
            mkdir -p dist/.objs
            touch dist/.objs/vec.o
          fi
          llvm-ar rcs dist/libsqlite_vec0.a dist/.objs/vec.o
      - run: ls -la dist
      - uses: actions/upload-artifact@v4
        with:
          name: sqlite-vec-linux-mips64-extension
          path: dist/*
  build-linux-loongarch64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build in Debian bookworm container
        run: |
          mkdir -p dist
          CONTAINER=$(docker create \
            -v ${{ github.workspace }}:/src \
            -w /src \
            debian:testing-slim \
            bash -c "
              set -e
              apt-get update
              # Try installing loongarch64 cross-compiler.
              # The package name may vary: gcc-loongarch64-linux-gnu or others.
              apt-get install -y gcc make curl 2>/dev/null || true
              apt-get install -y gcc-loongarch64-linux-gnu 2>/dev/null || true
              apt-get install -y gcc-loongarch64-linux-gnuabi64 2>/dev/null || true
              # Find the actual cross-compiler binary
              LOONGARCH_CC=\$(ls /usr/bin/loongarch64-*-gcc 2>/dev/null | head -1)
              if [ -z \"\$LOONGARCH_CC\" ]; then
                echo 'ERROR: No loongarch64 cross-compiler found'
                echo 'Available gcc binaries:'
                ls /usr/bin/*gcc* 2>/dev/null | grep -i loong || true
                exit 1
              fi
              echo \"Using cross-compiler: \$LOONGARCH_CC\"
              LOONGARCH_PREFIX=\$(echo \$LOONGARCH_CC | sed 's/-gcc$//')
              ./scripts/vendor.sh
              make sqlite-vec.h
              \$LOONGARCH_CC \
                -fPIC -shared -Wall -Wextra -Ivendor/ -O3 \
                sqlite-vec.c -o dist/vec0.so
              \$LOONGARCH_CC \
                -Ivendor/ -DSQLITE_CORE -DSQLITE_VEC_STATIC -O3 \
                -c sqlite-vec.c -o dist/vec.o
              \${LOONGARCH_PREFIX}-ar rcs dist/libsqlite_vec0.a dist/vec.o
              echo 'Build complete'
            " || true)
          docker start -a "$CONTAINER" 2>/dev/null || true
          docker cp "$CONTAINER":/src/dist/. dist/ 2>/dev/null || true
          docker rm "$CONTAINER" 2>/dev/null || true
      - run: ls -la dist
      - uses: actions/upload-artifact@v4
        with:
          name: sqlite-vec-linux-loongarch64-extension
          path: dist/*
  test-linux-cross-extensions:
    runs-on: ubuntu-24.04
    needs: [build-linux-mips64, build-linux-loongarch64]
    strategy:
      fail-fast: false
      matrix:
        platforms:
          [
            { name: linux-mips64, qemu: qemu-mips64, target: mips64-linux-gnuabi64, pkg: mips64 },
            { name: linux-loongarch64, qemu: qemu-loongarch64, target: loongarch64-linux-gnu, pkg: loongarch64 },
          ]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install QEMU and cross-compilation packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.platforms.qemu }}
          # These cross packages may not exist for all architectures (e.g. loongarch64)
          sudo apt-get install -y gcc-${{ matrix.platforms.target }} libc6-${{ matrix.platforms.pkg }}-cross libsqlite3-${{ matrix.platforms.pkg }}-cross 2>/dev/null || true
        continue-on-error: true
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: sqlite-vec-${{ matrix.platforms.name }}-extension
          path: dist
      - run: ls -la dist 2>/dev/null || echo "dist directory does not exist yet"
      - name: Build and run QEMU test
        run: |
          # Check if the .so artifact exists
          if [ ! -f dist/vec0.so ]; then
            echo "SKIP: vec0.so not found for ${{ matrix.platforms.name }}, cannot run QEMU test"
            exit 0
          fi
          # Check if cross-compiler and sysroot are available
          if ! command -v gcc-${{ matrix.platforms.target }} &>/dev/null; then
            echo "SKIP: gcc-${{ matrix.platforms.target }} not available, cannot run QEMU test"
            exit 0
          fi
          SYSROOT=/usr/${{ matrix.platforms.target }}
          if [ ! -d "$SYSROOT" ]; then
            echo "SKIP: sysroot $SYSROOT not found, cannot run QEMU test"
            exit 0
          fi
          cat > test_qemu.c << 'TESTEOF'
          #include <stdio.h>
          #include <sqlite3.h>

          int main() {
              sqlite3 *db;
              sqlite3_stmt *stmt;
              int rc;

              rc = sqlite3_open(":memory:", &db);
              if (rc != SQLITE_OK) { printf("FAIL: sqlite3_open\n"); return 1; }
              rc = sqlite3_load_extension(db, "./dist/vec0.so", 0, 0);
              if (rc != SQLITE_OK) { printf("FAIL: load_extension: %s\n", sqlite3_errmsg(db)); return 1; }
              rc = sqlite3_prepare_v2(db, "SELECT vec_version()", -1, &stmt, 0);
              if (rc != SQLITE_OK) { printf("FAIL: prepare vec_version\n"); return 1; }
              sqlite3_step(stmt);
              printf("OK: vec_version = %.2f\n", sqlite3_column_double(stmt, 0));
              sqlite3_finalize(stmt);
              rc = sqlite3_prepare_v2(db, "SELECT vec_distance_l2([1,2,3], [4,5,6])", -1, &stmt, 0);
              if (rc != SQLITE_OK) { printf("FAIL: prepare vec_distance_l2\n"); return 1; }
              sqlite3_step(stmt);
              printf("OK: vec_distance_l2 = %.2f\n", sqlite3_column_double(stmt, 0));
              sqlite3_finalize(stmt);
              rc = sqlite3_prepare_v2(db, "SELECT vec_distance_hamming(x'00', x'ff')", -1, &stmt, 0);
              if (rc != SQLITE_OK) { printf("FAIL: prepare vec_distance_hamming\n"); return 1; }
              sqlite3_step(stmt);
              printf("OK: vec_distance_hamming = %.0f\n", sqlite3_column_double(stmt, 0));
              sqlite3_finalize(stmt);
              sqlite3_close(db);
              printf("SUCCESS: All QEMU tests passed\n");
              return 0;
          }
          TESTEOF
          gcc-${{ matrix.platforms.target }} -I$SYSROOT/include -L$SYSROOT/lib \
            -o test_qemu test_qemu.c -lsqlite3
          export QEMU_LD_PREFIX=$SYSROOT
          ${{ matrix.platforms.qemu }} ./test_qemu
