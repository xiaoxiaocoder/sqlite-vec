  dist:
    runs-on: ubuntu-latest
    needs:
      [
        build-linux-mips64,
        build-linux-loongarch64,
        build-windows-i686-extension,
      ]
    environment:
      name: release
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: sqlite-vec-linux-mips64-extension
          path: dist/linux-mips64
      - uses: actions/download-artifact@v4
        with:
          name: sqlite-vec-linux-loongarch64-extension
          path: dist/linux-loongarch64
      - uses: actions/download-artifact@v4
        with:
          name: sqlite-vec-windows-i686-extension
          path: dist/windows-i686
      - run: make sqlite-vec.h
      - uses: asg017/setup-sqlite-dist@fadb0183a6ec70c3f1942de7d232b087ff2bacd1
      - run: sqlite-dist build --set-version $(cat VERSION)
      - run: |
          gh release upload ${{ github.ref_name }} \
            .sqlite-dist/amalgamation/* \
            .sqlite-dist/github_releases/* \
            .sqlite-dist/spm/* \
            .sqlite-dist/sqlpkg/* \
            .sqlite-dist/checksums.txt \
            .sqlite-dist/sqlite-dist-manifest.json \
            .sqlite-dist/install.sh
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: |
          VERSION=$(cat VERSION)
          if echo "$VERSION" | grep -q "alpha"; then
            TAG=alpha
          elif echo "$VERSION" | grep -q "beta"; then
            TAG=beta
          else
            TAG=latest
          fi
          npm publish --provenance --access public --tag $TAG .sqlite-dist/npm/sqlite-vec-wasm-demo.tar.gz || true
          npm publish --provenance --access public --tag $TAG .sqlite-dist/npm/sqlite-vec.tar.gz || true
        env:
          NODE_AUTH_TOKEN: ""
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2
      - run: |
          for file in .sqlite-dist/gem/*; do
            gem push  "$file"
          done
        env:
          GEM_HOST_API_KEY: ${{ secrets.GEM_HOST_API_KEY }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install twine
      - run: |
          twine upload .sqlite-dist/pip/* || true
          twine upload .sqlite-dist/datasette/* || true
          twine upload .sqlite-dist/sqlite_utils/* || true
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
