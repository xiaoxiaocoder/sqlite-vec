  build-linux-mips64:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm
          sudo apt-get install -y libc6-mips64-cross libc6-dev-mips64-cross 2>/dev/null || true
      - run: ./scripts/vendor.sh
      - run: make sqlite-vec.h
      - run: |
          mkdir -p dist/.objs
          SYSROOT=/usr/mips64-linux-gnuabi64
          if [ -d "$SYSROOT/include" ]; then
            echo "Using sysroot: $SYSROOT"
            clang --target=mips64-linux-gnuabi64 --sysroot=$SYSROOT \
              -fuse-ld=lld -nostdlib \
              -Wl,--unresolved-symbols=ignore-all \
              -fPIC -shared -Wall -Wextra -Ivendor/ -O3 \
              sqlite-vec.c -o dist/vec0.so
            clang --target=mips64-linux-gnuabi64 --sysroot=$SYSROOT \
              -Ivendor/ -DSQLITE_CORE -DSQLITE_VEC_STATIC -O3 \
              -c sqlite-vec.c -o dist/.objs/vec.o
          else
            echo "No sysroot, building with freestanding fallback"
            clang --target=mips64-linux-gnuabi64 -fuse-ld=lld -nostdlib \
              -Wl,--unresolved-symbols=ignore-all \
              -fPIC -shared -Wall -Wextra -Ivendor/ -O3 \
              sqlite-vec.c -o dist/vec0.so
            mkdir -p dist/.objs
            touch dist/.objs/vec.o
          fi
          llvm-ar rcs dist/libsqlite_vec0.a dist/.objs/vec.o
      - uses: actions/upload-artifact@v4
        with:
          name: sqlite-vec-linux-mips64-extension
          path: dist/*
  build-linux-loongarch64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Build in Debian bookworm container
        run: |
          mkdir -p dist
          CONTAINER=$(docker create \
            -v ${{ github.workspace }}:/src \
            -w /src \
            debian:bookworm-slim \
            bash -c "
              set -e
              apt-get update
              # Try installing loongarch64 cross-compiler.
              # The package name may vary: gcc-loongarch64-linux-gnu or others.
              apt-get install -y gcc make curl 2>/dev/null || true
              apt-get install -y gcc-loongarch64-linux-gnu 2>/dev/null || true
              apt-get install -y gcc-loongarch64-linux-gnuabi64 2>/dev/null || true
              # Find the actual cross-compiler binary
              LOONGARCH_CC=\$(ls /usr/bin/loongarch64-*-gcc 2>/dev/null | head -1)
              if [ -z \"\$LOONGARCH_CC\" ]; then
                echo 'ERROR: No loongarch64 cross-compiler found'
                echo 'Available gcc binaries:'
                ls /usr/bin/*gcc* 2>/dev/null | grep -i loong || true
                exit 1
              fi
              echo \"Using cross-compiler: \$LOONGARCH_CC\"
              LOONGARCH_PREFIX=\$(echo \$LOONGARCH_CC | sed 's/-gcc$//')
              ./scripts/vendor.sh
              make sqlite-vec.h
              \$LOONGARCH_CC \
                -fPIC -shared -Wall -Wextra -Ivendor/ -O3 \
                sqlite-vec.c -o dist/vec0.so
              \$LOONGARCH_CC \
                -Ivendor/ -DSQLITE_CORE -DSQLITE_VEC_STATIC -O3 \
                -c sqlite-vec.c -o dist/vec.o
              \${LOONGARCH_PREFIX}-ar rcs dist/libsqlite_vec0.a dist/vec.o
              echo 'Build complete'
            " || true)
          docker start -a "$CONTAINER" 2>/dev/null || true
          docker cp "$CONTAINER":/src/dist/. dist/ 2>/dev/null || true
          docker rm "$CONTAINER" 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: sqlite-vec-linux-loongarch64-extension
          path: dist/*
