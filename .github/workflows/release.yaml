  build-windows-i686-extension:
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86
      - run: ./scripts/vendor.sh
        shell: bash
      - run: make sqlite-vec.h
      - run: mkdir dist
      - run: cl.exe /fPIC -shared /W4 /Ivendor/ /O2 /LD /D_ARCH_WINDOWS_32 sqlite-vec.c -o dist/vec0.dll
      - uses: actions/upload-artifact@v4
        with:
          name: sqlite-vec-windows-i686-extension
          path: dist/*
